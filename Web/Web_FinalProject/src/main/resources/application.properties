# ====================== DATABASE CONFIG (Oracle) ======================
# Thay <host>, <port>, <service_name> cho phu hop moi truong cua ban
# Vi du Oracle local  : jdbc:oracle:thin:@localhost:1521:ORCL
# Vi du Oracle Docker  : jdbc:oracle:thin:@localhost:1521/XEPDB1
# Vi du Oracle 21c CDB: jdbc:oracle:thin:@//localhost:1521/ORCLPDB1
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
spring.datasource.username=TRASUA
spring.datasource.password=TraSua@2024
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Hibernate Dialect cho Oracle 12c tro len (Oracle 21c / 23ai dung dialect nay)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.Oracle12cDialect

# Khong de Hibernate tu dong tao/sua bang (dung script SQL thu cong)
spring.jpa.hibernate.ddl-auto=none

# ✅ Giu nguyen ten bang & cot dung nhu trong Entity (khong tu them dau "_")
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ====================== JPA / HIBERNATE LOGGING ======================
# ❌ Tat log SQL trong console (bat len khi debug: true)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ❌ Giam muc log Hibernate
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO
logging.level.org.hibernate.stat=INFO
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=WARN

# ====================== SERVER ======================
server.servlet.encoding.force=true
server.servlet.encoding.charset=UTF-8

# ====================== STATIC RESOURCES ======================
spring.web.resources.static-locations=classpath:/static/
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
thymeleaf.layout.prefix=classpath:/templates/
thymeleaf.layout.suffix=.html
thymeleaf.layout.enable=true
thymeleaf.layout.dialect-prefix=layout

# ====================== MULTIPART UPLOAD ======================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

