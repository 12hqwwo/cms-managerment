<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{vendor/vendor-layout}">
<head>
    <title>Kho hàng - Danh sách sản phẩm</title>
    <style>
        .table-hover tbody tr:hover {
            background-color: #f5f5f5;
            transition: 0.2s;
        }
        #searchInput, #categorySelect {
            max-width: 280px;
        }
        .badge {
            font-size: 0.9rem;
            padding: 5px 10px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="text-primary mb-0">
            <i class="fas fa-boxes"></i> Kho hàng - [[${branch.branchName}]]
        </h4>

        <div class="d-flex gap-2">
            <button class="btn btn-success" data-toggle="modal" data-target="#requestInventoryModal">
                <i class="fas fa-plus"></i> Yêu cầu nhập hàng
            </button>
            <select id="categorySelect" class="form-control mr-2">
                <option value="">-- Tất cả danh mục --</option>
            </select>
            <input id="searchInput" type="text" class="form-control" placeholder="🔍 Tìm sản phẩm...">
        </div>
    </div>

    <!-- Modal Yêu cầu nhập hàng -->
    <div class="modal fade" id="requestInventoryModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-boxes"></i> Tạo Phiếu Yêu Cầu Nhập Hàng</h5>
                    <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="requestInventoryForm">
                        <div class="form-group">
                            <label>Ghi chú / Lý do:</label>
                            <textarea class="form-control" id="requestNote" rows="2" placeholder="Ví dụ: Bổ sung nguyên liệu cho cuối tuần..."></textarea>
                        </div>
                        <hr>
                        <h6>Danh sách sản phẩm cần nhập:</h6>
                        <div class="table-responsive">
                            <table class="table table-sm table-bordered" id="requestItemsTable">
                                <thead class="thead-light">
                                    <tr>
                                        <th>Sản phẩm (Mã - Tên - Size)</th>
                                        <th width="150">Số lượng xin cấp</th>
                                        <th width="50">Xóa</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Items will be appended here -->
                                </tbody>
                            </table>
                        </div>
                        <button type="button" class="btn btn-outline-primary btn-sm mb-3" id="addRequestItemBtn">
                            <i class="fas fa-plus"></i> Thêm sản phẩm vào phiếu
                        </button>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-success" id="submitRequestBtn">Gửi Yêu Cầu</button>
                </div>
            </div>
        </div>
    </div>

    <div class="table-responsive shadow-sm rounded">
        <table class="table table-bordered table-hover align-middle" id="productTable">
            <thead class="thead-dark text-center">
                <tr>
                    <th>Mã</th>
                    <th>Tên sản phẩm</th>
                    <th>Size</th>
                    <th>Đường</th>
                    <th>Số lượng</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody class="text-center">
                <tr>
                    <td colspan="6" class="text-muted py-4">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2">Đang tải dữ liệu...</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<th:block layout:fragment="scripts">
<script th:inline="javascript">
document.addEventListener("DOMContentLoaded", () => {
    const branchId = /*[[${branch.id}]]*/ 0;
    console.log("✅ branchId =", branchId);

    const tbody = document.querySelector("#productTable tbody");
    const searchInput = document.getElementById("searchInput");
    const categorySelect = document.getElementById("categorySelect");

    if (!branchId || branchId === 0) {
        tbody.innerHTML = `
            <tr><td colspan="6" class="text-danger py-3">
                Không tìm thấy chi nhánh hợp lệ (branchId = 0).
            </td></tr>`;
        return;
    }

    async function loadProducts(url = `/api/branch-products/branch/${branchId}`) {
        console.log("📡 Fetching:", url);
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            console.log("📦 Dữ liệu nhận được:", data);

            const products = Array.isArray(data) ? data : (data.products || []);
            if (!products.length) {
                tbody.innerHTML = `
                    <tr><td colspan="6" class="text-muted py-4">
                        Không có sản phẩm nào trong kho.
                    </td></tr>`;
                return;
            }

            tbody.innerHTML = "";
            products.forEach(p => {
                tbody.insertAdjacentHTML("beforeend", `
                    <tr>
                        <td>${p.productCode || "—"}</td>
                        <td>
                            <a href="/vendor-page/product-detail?productDetailId=${p.productDetailId}" 
                               class="text-primary font-weight-bold">
                                ${p.productName}
                            </a>
                        </td>
                        <td>${p.size?.name || "—"}</td>
                        <td>${p.color?.name || "—"}</td>
                        <td>${p.quantity}</td>
                        <td>
                            ${p.quantity > 0
                                ? '<span class="badge badge-success">Còn hàng</span>'
                                : '<span class="badge badge-secondary">Hết hàng</span>'}
                        </td>
                    </tr>
                `);
            });
        } catch (err) {
            console.error("❌ Lỗi khi tải dữ liệu:", err);
            tbody.innerHTML = `
                <tr><td colspan="6" class="text-danger py-3">
                    Lỗi khi tải dữ liệu: ${err.message}
                </td></tr>`;
        }
    }

    // Load danh muc tu DB thuc te
    async function loadCategories() {
        try {
            const res = await fetch('/api/branch-products/categories');
            const cats = await res.json();
            cats.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name;
                categorySelect.appendChild(opt);
            });
        } catch (err) {
            console.error('Loi tai danh muc:', err);
        }
    }

    searchInput.addEventListener("input", function () {
        const keyword = this.value.toLowerCase();
        const rows = tbody.querySelectorAll("tr");
        rows.forEach(row => {
            const name = row.children[1]?.textContent.toLowerCase();
            const code = row.children[0]?.textContent.toLowerCase();
            row.style.display = (name?.includes(keyword) || code?.includes(keyword)) ? "" : "none";
        });
    });

    categorySelect.addEventListener("change", function () {
        const catId = this.value;
        const url = catId
            ? `/api/branch-products/branch/${branchId}/category/${catId}`
            : `/api/branch-products/branch/${branchId}`;
        loadProducts(url);
    });

    loadCategories();
    loadProducts();
    
    // --- Lôgic Yêu Cầu Nhập Hàng ---
    let requestItems = [];
    const requestItemsTable = document.getElementById("requestItemsTable").getElementsByTagName("tbody")[0];
    
    document.getElementById("addRequestItemBtn").addEventListener("click", function() {
        // Fetch all system products to allow vendor to request (even those not in their branch)
        fetch('/api/vendor/inventory-request/master-products')
            .then(res => res.json())
            .then(data => {
                const tr = document.createElement("tr");
                let options = '<option value="">-- Chọn sản phẩm --</option>';
                data.forEach(p => {
                    const sizeColor = (p.size || "") + (p.color ? (" - " + p.color) : "");
                    options += `<option value="${p.productDetailId}">${p.productCode} - ${p.productName} ${sizeColor ? '(' + sizeColor + ')' : ''}</option>`;
                });
                
                tr.innerHTML = `
                    <td>
                        <select class="form-control form-control-sm product-select" required>
                            ${options}
                        </select>
                    </td>
                    <td>
                        <input type="number" class="form-control form-control-sm quantity-input" min="1" value="1" required>
                    </td>
                    <td>
                        <button type="button" class="btn btn-sm btn-danger remove-item-btn"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                requestItemsTable.appendChild(tr);
                
                tr.querySelector('.remove-item-btn').addEventListener('click', function() {
                    tr.remove();
                });
            })
            .catch(err => console.error(err));
    });

    document.getElementById("submitRequestBtn").addEventListener("click", function() {
        const note = document.getElementById("requestNote").value;
        const rows = requestItemsTable.getElementsByTagName("tr");
        const details = [];
        
        for (let row of rows) {
            const pdId = row.querySelector('.product-select').value;
            const qty = row.querySelector('.quantity-input').value;
            if (pdId && qty > 0) {
                details.push({
                    productDetailId: parseInt(pdId), // This should ideally be product_detail_id, but the UI might need to select size/sugar. For simplicity we map to productDetail ID.
                    requestedQuantity: parseInt(qty)
                });
            }
        }
        
        if (details.length === 0) {
            alert("Vui lòng thêm ít nhất 1 sản phẩm hợp lệ!");
            return;
        }

        const dataSend = {
            note: note,
            branchId: branchId,
            requestDetails: details
        };

        fetch('/api/vendor/inventory-request', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dataSend)
        })
        .then(res => {
            if (res.ok) {
                alert("Đã gửi yêu cầu nhập hàng thành công!");
                try {
                    if (typeof bootstrap !== 'undefined' && bootstrap.Modal) {
                        bootstrap.Modal.getInstance(document.getElementById('requestInventoryModal')).hide();
                    } else {
                        $('#requestInventoryModal').modal('hide');
                    }
                } catch(e) { console.log(e); }
                requestItemsTable.innerHTML = '';
                document.getElementById("requestNote").value = '';
            } else {
                alert("Có lỗi xảy ra khi gửi yêu cầu.");
            }
        })
        .catch(err => console.error(err));
    });
});
</script>
</th:block>

</body>
</html>
