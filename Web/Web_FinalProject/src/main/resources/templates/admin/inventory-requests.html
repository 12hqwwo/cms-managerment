<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{admin/admin-layout}">
<head>
    <title>Duyệt Yêu Cầu Nhập Hàng</title>
</head>
<body>
<div layout:fragment="content">
    <div class="content">
        <div class="animated fadeIn">
            <div class="row">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <strong class="card-title mb-0">Quản lý Yêu Cầu Cấp Hàng từ Chi Nhánh</strong>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table id="requestTable" class="table table-striped table-bordered text-center">
                                    <thead class="thead-dark">
                                        <tr>
                                            <th>ID</th>
                                            <th>Chi Nhánh</th>
                                            <th>Người tạo</th>
                                            <th>Ngày tạo</th>
                                            <th>Ghi chú</th>
                                            <th>Trạng thái</th>
                                            <th>Thao tác</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <!-- Data will be loaded via JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Duyệt Yêu Cầu -->
    <div class="modal fade" id="approveModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title text-white">Duyệt Yêu Cầu Nhập Hàng #<span id="modalRequestId"></span></h5>
                    <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <table class="table table-sm table-bordered" id="approveDetailsTable">
                        <thead class="thead-light text-center">
                            <tr>
                                <th>Sản phẩm</th>
                                <th width="120">Tồn kho tổng</th>
                                <th width="120">SL Xin cấp</th>
                                <th width="150">SL Thực tế cấp</th>
                            </tr>
                        </thead>
                        <tbody class="text-center">
                            <!-- Items loaded dynamically -->
                        </tbody>
                    </table>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-danger" id="rejectBtn">Từ Chối</button>
                    <button type="button" class="btn btn-success" id="approveBtn">Duyệt (Cấp hàng)</button>
                </div>
            </div>
        </div>
    </div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    loadRequests();

    function loadRequests() {
        fetch('/api/admin/inventory-requests')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('requestTable').getElementsByTagName('tbody')[0];
                tbody.innerHTML = '';
                data.forEach(req => {
                    const statusBadge = req.status === 'PENDING' ? '<span class="badge badge-warning">Đang chờ duyệt</span>' : 
                                      req.status === 'APPROVED' ? '<span class="badge badge-success">Đã duyệt</span>' : 
                                      req.status === 'PARTIAL_APPROVED' ? '<span class="badge badge-info">Duyệt một phần</span>' :
                                      '<span class="badge badge-danger">Từ chối</span>';
                    
                    const actionBtn = req.status === 'PENDING' 
                        ? `<button class="btn btn-sm btn-primary" onclick="openApproveModal(${req.id})"><i class="fas fa-check"></i> Xử lý</button>`
                        : `<button class="btn btn-sm btn-info" onclick="viewDetails(${req.id})"><i class="fas fa-eye"></i> Xem</button>`;
                        
                    const row = `<tr>
                        <td>${req.id}</td>
                        <td>${req.branchName}</td>
                        <td>${req.createdByEmail}</td>
                        <td>${new Date(req.createdAt).toLocaleString()}</td>
                        <td>${req.note || ''}</td>
                        <td>${statusBadge}</td>
                        <td>${actionBtn}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            })
            .catch(err => console.error(err));
    }
});

let currentRequestId = null;

function openApproveModal(id) {
    currentRequestId = id;
    document.getElementById('modalRequestId').innerText = id;
    
    fetch(`/api/admin/inventory-requests/${id}`)
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('approveDetailsTable').getElementsByTagName('tbody')[0];
            tbody.innerHTML = '';
            
            data.details.forEach(item => {
                // Tồn kho tổng: Ở kho admin, tồn kho chính là quantity trong product_detail.
                const row = `<tr>
                    <td class="text-left">${item.productCode} - ${item.productName} (${item.size} - ${item.color})</td>
                    <td><span class="badge badge-info">${item.masterInventoryQty}</span></td>
                    <td><strong class="text-danger">${item.requestedQuantity}</strong></td>
                    <td>
                        <input type="number" class="form-control form-control-sm text-center approve-qty-input" 
                               data-detail-id="${item.detailId}" 
                               data-max="${item.masterInventoryQty}"
                               value="${item.requestedQuantity}" min="0">
                    </td>
                </tr>`;
                tbody.innerHTML += row;
            });
            
            try {
                if (typeof bootstrap !== 'undefined' && bootstrap.Modal) {
                    const modal = new bootstrap.Modal(document.getElementById('approveModal'));
                    modal.show();
                } else {
                    $('#approveModal').modal('show');
                }
            } catch (e) {
                console.error("Modal error:", e);
                alert("Lỗi hiển thị modal: " + e.message);
            }
            
            // Validate input
            document.querySelectorAll('.approve-qty-input').forEach(input => {
                input.addEventListener('change', function() {
                    const max = parseInt(this.getAttribute('data-max'));
                    if (parseInt(this.value) > max) {
                        alert("Không thể cấp nhiều hơn số lượng tồn kho tổng!");
                        this.value = max;
                    }
                });
            });
        })
        .catch(err => {
            console.error(err);
            alert("Lỗi khi tải chi tiết: " + err.message);
        });
}

function viewDetails(id) {
    // Tương tự, chỉ show data dạng read-only
    alert("Tính năng xem chi tiết đang phát triển (ID: " + id + ")");
}

document.getElementById('approveBtn').addEventListener('click', function() {
    if (!currentRequestId) return;
    
    const approveData = [];
    document.querySelectorAll('.approve-qty-input').forEach(input => {
        approveData.push({
            detailId: parseInt(input.getAttribute('data-detail-id')),
            approvedQuantity: parseInt(input.value)
        });
    });
    
    fetch(`/api/admin/inventory-requests/${currentRequestId}/approve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(approveData)
    })
    .then(res => {
        if (res.ok) {
            alert("Đã duyệt phiếu thành công!");
            try {
                if (typeof bootstrap !== 'undefined' && bootstrap.Modal) {
                    bootstrap.Modal.getInstance(document.getElementById('approveModal')).hide();
                } else {
                    $('#approveModal').modal('hide');
                }
            } catch(e) { console.log(e); }
            location.reload();
        } else {
            res.text().then(text => alert("Lỗi: " + text));
        }
    })
    .catch(err => console.error(err));
});

document.getElementById('rejectBtn').addEventListener('click', function() {
    if (!currentRequestId) return;
    if (!confirm("Bạn có chắc muốn từ chối phiếu này không?")) return;
    
    fetch(`/api/admin/inventory-requests/${currentRequestId}/reject`, {
        method: 'POST'
    })
    .then(res => {
        if (res.ok) {
            alert("Đã từ chối phiếu!");
            try {
                if (typeof bootstrap !== 'undefined' && bootstrap.Modal) {
                    bootstrap.Modal.getInstance(document.getElementById('approveModal')).hide();
                } else {
                    $('#approveModal').modal('hide');
                }
            } catch(e) { console.log(e); }
            location.reload();
        }
    })
    .catch(err => console.error(err));
});
</script>
</div>
</body>
</html>
