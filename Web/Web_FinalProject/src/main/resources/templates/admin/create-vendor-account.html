<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout.html}">
<head>
    <meta charset="UTF-8">
    <title>Tạo Tài Khoản Vendor</title>
    <style>
        .form-section {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #007bff;
        }
        .form-section h5 {
            color: #007bff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .red_require {
            color: red;
            font-weight: bold;
        }
        .success-message {
            color: green;
            margin-top: 10px;
        }
        .error-message {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="container mt-4">
            <h3>Tạo Tài Khoản Vendor và Chi Nhánh</h3>
            <hr>

            <!-- Alert Message -->
            <div class="alert alert-success alert-dismissible fade show" role="alert" th:if="${message}">
                <strong>Thành công!</strong> <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${error}">
                <strong>Lỗi!</strong> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Form Tạo Vendor Account -->
            <form id="vendor-form" onsubmit="event.preventDefault();" class="needs-validation">
                <!-- Phần 1: Tạo Tài Khoản Mới -->
                <div class="form-section" id="newAccountSection">
                    <h5>I. Thông Tin Tài Khoản Mới</h5>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email <span class="red_require">*</span></label>
                                <input type="email" class="form-control" id="email" name="email" 
                                       placeholder="Nhập email" required>
                                <div class="invalid-feedback">
                                    Email không hợp lệ
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="code" class="form-label">Mã Tài Khoản <span class="red_require">*</span></label>
                                <input type="text" class="form-control" id="code" name="code" 
                                       placeholder="VD: NV001, VENDOR_HN..." required>
                                <div class="invalid-feedback">
                                    Mã tài khoản không được để trống
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-12">
                            <div class="mb-3">
                                <label for="name" class="form-label">Tên Người Quản Lý (Họ Tên) <span class="red_require">*</span></label>
                                <input type="text" class="form-control" id="name" name="name" 
                                       placeholder="Nhập họ tên" required>
                                <div class="invalid-feedback">
                                    Vui lòng nhập tên
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="password" class="form-label">Mật Khẩu <span class="red_require">*</span></label>
                                <input type="password" class="form-control" id="password" name="password" 
                                       placeholder="Nhập mật khẩu" required minlength="6">
                                <div class="invalid-feedback">
                                    Mật khẩu phải có ít nhất 6 ký tự
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Xác Nhận Mật Khẩu <span class="red_require">*</span></label>
                                <input type="password" class="form-control" id="confirmPassword" 
                                       placeholder="Nhập lại mật khẩu" required>
                                <div class="invalid-feedback">
                                    Vui lòng xác nhận mật khẩu
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="phoneNumber" class="form-label">Số Điện Thoại Tài Khoản</label>
                                <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber" 
                                       placeholder="Nhập số điện thoại tài khoản">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="branchId" class="form-label">Gán vào Chi Nhánh (Không bắt buộc)</label>
                                <select class="form-control" id="branchId" name="branchId">
                                    <option value="">-- Để trống nếu chưa muốn gán --</option>
                                    <!-- Các option sẽ được render bằng JS -->
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Nút Hành Động -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                        <i class="fas fa-save"></i> Tạo Vendor Account
                    </button>
                    <a href="/admin-only/account-management" class="btn btn-secondary btn-lg">
                        <i class="fas fa-arrow-left"></i> Quay Lại
                    </a>
                </div>
            </form>
        </div>

        <script>
            // Validate form trước khi submit
            document.getElementById('vendor-form').addEventListener('submit', function(e) {
                e.preventDefault();

                const branchId = document.getElementById('branchId').value;

                let data = {};
                if (branchId) {
                    data.branchId = parseInt(branchId, 10);
                }

                // Tạo account mới
                const email = document.getElementById('email').value;
                const code = document.getElementById('code').value;
                const name = document.getElementById('name').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const phoneNumber = document.getElementById('phoneNumber').value;

                if (!email || !code || !name || !password || !confirmPassword) {
                    alert('Vui lòng điền đầy đủ thông tin tài khoản!');
                    return;
                }

                if (password !== confirmPassword) {
                    alert('Mật khẩu không khớp!');
                    return;
                }

                if (password.length < 6) {
                    alert('Mật khẩu phải có ít nhất 6 ký tự!');
                    return;
                }

                data.email = email;
                data.code = code;
                data.name = name;
                data.password = password;
                data.phoneNumber = phoneNumber;
                submitCreateVendorForm(data);
            });

            // Gửi request tạo vendor account mới
            function submitCreateVendorForm(data) {
            	fetch('/api/admin/accounts-branches/create-vendor-only', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                })
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(text => { throw new Error(text) });
                    }
                    return response.json();
                })
                .then(result => {
                    alert('Tạo vendor account thành công!');
                    window.location.href = '/admin-only/account-management';
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Có lỗi xảy ra: ' + error.message);
                });
            }

            // Load danh sách branch vào dropdown
            function loadBranches() {
                fetch('/api/branches/active')
                    .then(res => res.json())
                    .then(branches => {
                        const select = document.getElementById('branchId');
                        branches.forEach(b => {
                            const option = document.createElement('option');
                            option.value = b.id;
                            option.textContent = b.branchCode + ' - ' + b.branchName;
                            select.appendChild(option);
                        });
                    })
                    .catch(err => console.error("Lỗi load branch:", err));
            }

            // Gửi request gán branch cho account hiện có
            function submitAssignBranchForm(data) {
                console.log("Gửi request assign-branch-with-info với data:", JSON.stringify(data, null, 2));
                
                fetch('/api/admin/accounts-branches/assign-branch-with-info', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                })
                .then(response => {
                    console.log("Response status:", response.status);
                    console.log("Response headers:", response.headers);
                    return response.text().then(text => {
                        console.log("Response body:", text);
                        try {
                            return JSON.parse(text);
                        } catch(e) {
                            console.error("Lỗi parse JSON:", e);
                            return { error: text };
                        }
                    });
                })
                .then(result => {
                    console.log("Result:", result);
                    if (result.error) {
                        alert('Có lỗi: ' + (result.error || JSON.stringify(result)));
                    } else {
                        alert('Gán branch thành công!');
                        setTimeout(() => {
                            window.location.href = '/admin/branch-management';
                        }, 1000);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Có lỗi xảy ra: ' + error.message);
                });
            }

            // Enable Bootstrap validation
            (function() {
                'use strict';
                window.addEventListener('load', function() {
                    loadBranches(); // Load danh sách chi nhánh khi trang vừa lên
                    
                    const forms = document.querySelectorAll('.needs-validation');
                    Array.prototype.slice.call(forms).forEach(function(form) {
                        form.addEventListener('submit', function(event) {
                            if (!form.checkValidity()) {
                                event.preventDefault();
                                event.stopPropagation();
                            }
                            form.classList.add('was-validated');
                        }, false);
                    });
                }, false);
            })();
        </script>
    </div>
</body>
</html>
