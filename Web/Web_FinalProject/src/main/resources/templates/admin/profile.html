<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout.html}">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật thông tin</title>
    <style>
        .tab-bills {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .tab-bills .line {
            display: none !important; /* Hide original animated line */
        }
        .tab-item {
            min-width: 160px;
            padding: 12px 24px;
            font-size: 15px;
            text-align: center;
            color: #495057;
            background-color: #f1f3f5;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .btn-primary, .btn-primary:hover, .btn-primary:focus, .btn-primary:active {
            background-color: #272c33 !important;
            border-color: #272c33 !important;
            color: #fff !important;
        }
        .btn-outline-primary {
            color: #272c33 !important;
            border-color: #272c33 !important;
        }
        .btn-outline-primary:hover {
            background-color: #272c33 !important;
            color: #fff !important;
        }
        .tab-item:hover {
            background-color: #e9ecef;
            color: #212529;
            transform: translateY(-1px);
        }
        .tab-item.active {
            background-color: #272c33;
            color: #ffffff;
            border-color: #272c33;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        .custom-modal {
            display: none;
            position: fixed;
            z-index: 1050;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .custom-modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 24px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            position: relative;
        }
        .close {
            position: absolute;
            right: 16px;
            top: 16px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="custom-modal" id="add-address-modal">
        <div class="custom-modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div class="modal-header mb-3">
                <h5 class="modal-title">Thông tin địa chỉ</h5>
            </div>
            <form id="address-form">
                <div class="form-group mb-3">
                    <label for="district">Quận/Huyện</label>
                    <select class="form-control" id="district">
                        <option value="">Chọn quận, huyện</option>
                    </select>
                </div>
                <div class="form-group mb-3">
                    <label for="ward">Phường/Xã</label>
                    <select class="form-control" id="ward">
                        <option value="">Chọn phường, xã</option>
                    </select>
                </div>
                <div class="form-group mb-3">
                    <label for="street">Số nhà, tên đường</label>
                    <input class="form-control" type="text" name="street" id="street" placeholder="Số nhà, đường, xóm">
                </div>
                <button type="button" class="btn btn-primary w-100" id="save-address-btn">Lưu địa chỉ</button>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="card-title pb-3 border-bottom">Quản lý tài khoản</h3>
            
            <!-- Tab items -->
            <div class="tab-bills">
                <div class="tab-item active">Chỉnh sửa thông tin</div>
                <div class="tab-item">Đổi mật khẩu</div>
                <div class="line"></div>
            </div>

            <!-- Tab content -->
            <div class="tab-content">
                <div class="tab-pane active">
                    <form th:action="@{/update-profile}" method="post" id="profile-form">
                        <h4 class="h5 my-3">Thông tin cá nhân</h4>
                        <div class="alert alert-success" th:if="${successMessage != null}" th:text="${successMessage}"></div>
                        <div class="alert alert-danger" th:if="${errorMessage != null}" th:text="${errorMessage}"></div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <div class="form-group">
                                    <label class="form-label font-weight-bold">Họ và tên</label>
                                    <input type="text" class="form-control" name="name" id="name" th:value="${profile.name}">
                                    <span class="error text-danger text-sm"></span>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <div class="form-group">
                                    <label class="form-label font-weight-bold">Email</label>
                                    <input type="text" class="form-control" name="email" th:value="${profile.email}" readonly>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <div class="form-group">
                                    <label class="form-label font-weight-bold">Số điện thoại</label>
                                    <input type="text" class="form-control" id="phoneNumber" th:value="${profile.phoneNumber}" name="phoneNumber">
                                    <span class="error text-danger text-sm"></span>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <button class="btn btn-primary btn-save-profile">Lưu thay đổi</button>
                        </div>

                        <div class="border-top pt-3 mt-4">
                            <label class="form-label font-weight-bold h5">Địa chỉ giao hàng</label>
                            <div id="address-list" class="mb-3">
                                <div th:each="address: ${profile.addressShippingList}">
                                    <div class="d-flex align-items-center justify-content-between p-2 my-2 bg-light border rounded">
                                        <span>
                                            <i class="fa fa-map-marker text-danger mr-2" aria-hidden="true"></i>
                                            <span th:text="${address.address}"></span>
                                        </span>
                                        <button type="button" class="btn btn-sm btn-outline-danger delete-address-btn" th:address-id="${address.id}">
                                            <i class="fa fa-trash-o" aria-hidden="true"></i> Xóa
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <button type="button" class="btn btn-outline-primary" id="add-address">Thêm địa chỉ +</button>
                        </div>
                    </form>
                </div>

                <div class="tab-pane">
                    <form id="change-password-form" th:action="@{/change-password}" method="post">
                        <h4 class="h5 my-3">Đổi mật khẩu</h4>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <div class="form-group">
                                    <label class="form-label font-weight-bold">Mật khẩu hiện tại</label>
                                    <input type="password" class="form-control" id="currentPassword" name="currentPassword">
                                    <span class="error text-danger text-sm"></span>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <div class="form-group">
                                    <label class="form-label font-weight-bold">Mật khẩu mới</label>
                                    <input type="password" class="form-control" id="newPassword" name="newPassword">
                                    <span class="error text-danger text-sm"></span>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <div class="form-group">
                                    <label class="form-label font-weight-bold">Xác nhận mật khẩu mới</label>
                                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword">
                                    <span class="error text-danger text-sm"></span>
                                </div>
                            </div>
                        </div>
                        <div>
                            <button class="btn btn-primary btn-save-pass">Lưu thay đổi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            // Apply validator scripts if Validator is loaded
            if (typeof Validator !== 'undefined') {
                Validator({
                    form: '#profile-form',
                    formGroupSelector: '.form-group',
                    errorSelector: '.error',
                    rules: [
                        Validator.isRequired('#phoneNumber', 'Vui lòng nhập số điện thoại'),
                        Validator.isRequired('#name', 'Vui lòng nhập họ tên'),
                        Validator.minLength('#name', 2),
                        Validator.maxLength('#name', 50),
                        Validator.maxLength('#phoneNumber', 12),
                        Validator.minLength('#phoneNumber', 10),
                    ],
                });

                Validator({
                    form: '#change-password-form',
                    formGroupSelector: '.form-group',
                    errorSelector: '.error',
                    rules: [
                        Validator.isRequired('#currentPassword', 'Vui lòng nhập mật khẩu hiện tại'),
                        Validator.minLength('#currentPassword', 6),
                        Validator.isRequired('#newPassword', 'Vui lòng nhập mật khẩu mới'),
                        Validator.minLength('#newPassword', 6),
                        Validator.maxLength('#newPassword', 50),
                        Validator.isRequired('#confirmPassword', 'Vui lòng nhập lại mật khẩu mới'),
                        Validator.maxLength('#confirmPassword', 50),
                        Validator.minLength('#confirmPassword', 6),
                        Validator.isConfirmed('#confirmPassword', () => {
                            return document.querySelector('#change-password-form #newPassword').value;
                        }, 'Mật khẩu nhập lại không chính xác'),
                    ],
                });
            }

            $("#phoneNumber").on('keypress', function (e) {
                onlyAllowNumberInput(e);
            });

            function onlyAllowNumberInput(e) {
                const key = e.key;
                if (!/[\d\b]/.test(key)) {
                    e.preventDefault();
                }
            }

            const tabs = document.querySelectorAll(".tab-item");
            const panes = document.querySelectorAll(".tab-pane");
            const tabActive = document.querySelector(".tab-item.active");
            const line = document.querySelector(".tab-bills .line");

            if (tabActive && line) {
                line.style.left = tabActive.offsetLeft + "px";
                line.style.width = tabActive.offsetWidth + "px";
            }

            tabs.forEach((tab, index) => {
                const pane = panes[index];
                if (tab instanceof HTMLElement) {
                    tab.onclick = function () {
                        document.querySelector(".tab-item.active")?.classList.remove("active");
                        document.querySelector(".tab-pane.active")?.classList.remove("active");

                        if (line) {
                            line.style.left = tab.offsetLeft + "px";
                            line.style.width = tab.offsetWidth + "px";
                        }

                        tab.classList.add("active");
                        pane.classList.add("active");
                    };
                }
            });

            var addressSelected = {
                street: '',
                ward: '',
                district: '',
                province: 'Thành phố Hà Nội',
            };

            var district = [];
            var ward = [];

            $.ajax({
                type: 'GET',
                dataType: "json",
                url: `https://vapi.vnappmob.com/api/province/district/01`,
                success: function (data) {
                    district = data.results.map(item => ({ value: item.district_id, label: item.district_name }));
                    loadDistrictSelect(data);
                }
            });

            function loadDistrictSelect(data) {
                var selectElement = document.getElementById("district");
                selectElement.innerHTML = '';
                var defaultOption = document.createElement("option");
                defaultOption.text = "Chọn quận, huyện";
                defaultOption.value = "";
                selectElement.appendChild(defaultOption);

                for (var i = 0; i < data.results.length; i++) {
                    var option = document.createElement("option");
                    option.text = data.results[i].district_name;
                    option.value = data.results[i].district_id;
                    selectElement.appendChild(option);
                }
            }

            $("#district").on('change', async function () {
                var districtId = $(this).val();
                if (districtId == "") {
                    $("#ward").html('');
                } else {
                    const selectedOption = district.find((option) => option.value === districtId);
                    addressSelected.district = selectedOption.label;
                    await $.ajax({
                        type: 'GET',
                        dataType: "json",
                        url: `https://vapi.vnappmob.com/api/province/ward/${districtId}`,
                        success: function (data) {
                            ward = data.results.map(item => ({value: item.ward_id, label: item.ward_name}));
                            loadWardSelect(data);
                        }
                    });
                }
            });

            function loadWardSelect(data) {
                var selectElement = document.getElementById("ward");
                selectElement.innerHTML = '';
                var defaultOption = document.createElement("option");
                defaultOption.text = "Chọn phường, xã";
                defaultOption.value = "";
                selectElement.appendChild(defaultOption);

                for (var i = 0; i < data.results.length; i++) {
                    var option = document.createElement("option");
                    option.text = data.results[i].ward_name;
                    option.value = data.results[i].ward_id;
                    selectElement.appendChild(option);
                }
            }

            $("#ward").on('change', function () {
                const selectedOption = ward.find((option) => option.value === $(this).val());
                if (selectedOption) {
                    addressSelected.ward = selectedOption.label;
                }
            });

            $('#add-address').on('click', function () {
                $('#add-address-modal').show();
            });

            $('#closeModal').on('click', function () {
                $('#add-address-modal').hide();
            });

            $("#save-address-btn").on('click', function () {
                const districtVal = $("#district").val();
                const wardVal = $("#ward").val();
                const street = $("#street").val().trim();
                if (districtVal == "" || wardVal == "" || street == "") {
                    Swal.fire("Lỗi", "Vui lòng nhập đầy đủ địa chỉ", "error");
                } else {
                    addressSelected.street = street;
                    var dataSend = {
                        address: Object.entries(addressSelected)
                            .filter(([key, value]) => value !== null && value !== '')
                            .map(([key, value]) => value)
                            .join(', ')
                    };
                    $.ajax({
                        type: 'POST',
                        contentType: "application/json; charset=utf-8",
                        url: `/api/public/addressShipping`,
                        data: JSON.stringify(dataSend),
                        success: function (data) {
                            window.location.reload();
                        },
                        error: function (xhr, status, error) {
                            Swal.fire("Lỗi", xhr.responseJSON.message, "error");
                        }
                    });
                    $("#add-address-modal").hide();
                }
            });

            $('.delete-address-btn').on('click', function () {
                const id = $(this).attr('address-id');
                $.ajax({
                    type: 'DELETE',
                    contentType: "application/json; charset=utf-8",
                    url: `/api/deleteAddress/${id}`,
                    success: function (data) {
                        window.location.reload();
                    }
                });
            });
        });
    </script>
</div>
</body>
</html>
