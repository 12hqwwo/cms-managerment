<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout.html}">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Nhân Viên</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <!-- Dashboard Header -->
        <div class="row mb-4">
            <div class="col-12">
                <h3 class="font-weight-bold">Dashboard Nhân Viên</h3>
                <p class="text-muted">Chi nhánh: <strong class="text-primary" th:text="${branchName}"></strong></p>
                <p class="text-muted mb-0">Thống kê đơn hàng trong ngày hôm nay. Tổng số đơn: <strong th:text="${totalToday}"></strong></p>
            </div>
        </div>

        <!-- Thống kê Card -->
        <div class="row mb-4">
            <!-- Đơn mới -->
            <div class="col-md-4">
                <div class="card text-white bg-warning mb-3 shadow-sm">
                    <div class="card-header font-weight-bold"><i class="fas fa-file-invoice mr-2"></i> Đơn Mới (Chờ xác nhận)</div>
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <h2 class="card-title mb-0" th:text="${countNew}">0</h2>
                        <i class="fas fa-clock fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>

            <!-- Đang xử lý -->
            <div class="col-md-4">
                <div class="card text-white bg-info mb-3 shadow-sm">
                    <div class="card-header font-weight-bold"><i class="fas fa-shipping-fast mr-2"></i> Đang Xử Lý</div>
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <h2 class="card-title mb-0" th:text="${countProcessing}">0</h2>
                        <i class="fas fa-box-open fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>

            <!-- Hoàn thành -->
            <div class="col-md-4">
                <div class="card text-white bg-success mb-3 shadow-sm">
                    <div class="card-header font-weight-bold"><i class="fas fa-check-circle mr-2"></i> Hoàn Thành</div>
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <h2 class="card-title mb-0" th:text="${countCompleted}">0</h2>
                        <i class="fas fa-clipboard-check fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="row">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-white font-weight-bold">
                        <i class="fas fa-bolt text-warning mr-2"></i> Thao Tác Nhanh
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <a th:href="@{/admin/pos}" class="btn btn-outline-primary btn-lg btn-block py-4">
                                    <i class="fas fa-cash-register fa-2x mb-2 d-block"></i>
                                    POS Bán Hàng Tại Quầy
                                </a>
                            </div>
                            <div class="col-md-6">
                                <a th:href="@{/admin/bill-list}" class="btn btn-outline-secondary btn-lg btn-block py-4">
                                    <i class="fas fa-table fa-2x mb-2 d-block"></i>
                                    Quản Lý Hóa Đơn
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
